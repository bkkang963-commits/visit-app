<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한화임팩트 울산공장 공사 출입신청</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --hw-orange: #FF6600;
            --hw-dark: #222222;
            --hw-gray: #767676;
            --hw-bg: #F4F4F4;
            --hw-white: #FFFFFF;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--hw-bg); 
            padding: 20px; 
            color: var(--hw-dark); 
            line-height: 1.6; 
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        h3 { color: var(--hw-orange); font-size: 22px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .form-group { 
            background: var(--hw-white); 
            padding: 18px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); 
            border-left: 4px solid var(--hw-white); 
            transition: all 0.3s;
        }
        .form-group:focus-within { border-left: 4px solid var(--hw-orange); box-shadow: 0 4px 12px rgba(255, 102, 0, 0.1); }
        
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--hw-dark); }
        .sub-label { font-size: 11px; color: var(--hw-gray); font-weight: normal; display: block; margin-top: 4px; line-height: 1.4; }
        
        input { 
            width: 100%; border: none; font-size: 16px; outline: none; padding: 10px 0; 
            border-bottom: 1.5px solid #E0E0E0; background: transparent; color: var(--hw-dark); 
        }
        input:focus { border-bottom: 1.5px solid var(--hw-orange); }

        button { 
            width: 100%; padding: 18px; background: var(--hw-orange); color: white; border: none; 
            border-radius: 4px; font-size: 18px; font-weight: bold; margin-top: 20px; 
            margin-bottom: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 102, 0, 0.2); transition: all 0.2s;
        }
        button:active { background: #E65C00; transform: scale(0.98); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>한화임팩트 울산공장</h3>
            <div style="font-size: 14px; color: #555; margin-top: 5px; font-weight: 600;">공사 출입 신청 시스템</div>
        </div>

        <div class="form-group">
            <label>업체명 (소속사)</label>
            <input type="text" id="company" placeholder="예: 한화임팩트">
        </div>

        <div class="form-group">
            <label>출입자 성함</label>
            <input type="text" id="name" placeholder="예: 김한화">
        </div>

        <div class="form-group">
            <label>생년월일(8자리)</label>
            <input type="number" id="birth" placeholder="예: 19701101" oninput="limitLength(this, 8)">
        </div>

        <div class="form-group">
            <label>휴대전화 앞자리(4개)</label>
            <input type="number" id="phone_f" placeholder="1234" oninput="limitLength(this, 4)">
        </div>

        <div class="form-group">
            <label>휴대전화 뒷자리(4개)</label>
            <input type="number" id="phone_b" placeholder="5678" oninput="limitLength(this, 4)">
        </div>

        <div class="form-group">
            <label>공사 착수일 (출입 시작일)</label>
            <input type="date" id="s_date">
        </div>

        <div class="form-group">
            <label>공사 완료 예정일 (출입 종료일)</label>
            <input type="date" id="e_date">
        </div>

        <div class="form-group">
            <label>신규 안전교육 신청일
                <span class="sub-label">공사 인원은 교육일이 실제 '출입일'로 기록됩니다.</span>
            </label>
            <input type="date" id="edu_date">
        </div>

        <div class="form-group">
            <label>공사명 (방문 사유)</label>
            <input type="text" id="reason" placeholder="예: 감지기 확인 및 교체 공사">
        </div>

        <div class="form-group">
            <label>담당자 성함</label>
            <input type="text" id="manager" placeholder="예: 강병근" oninput="limitLength(this, 3)">
        </div>

        <button id="submit_btn">신청서 제출하기</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function limitLength(el, maxLength) {
            if (el.value.length > maxLength) { el.value = el.value.slice(0, maxLength); }
        }

        document.getElementById('submit_btn').addEventListener('click', () => {
            const data = {
                type: "공사출입",
                company: document.getElementById('company').value,
                name: document.getElementById('name').value,
                birth: document.getElementById('birth').value,
                phone_f: document.getElementById('phone_f').value,
                phone_b: document.getElementById('phone_b').value,
                s_date: document.getElementById('s_date').value,
                e_date: document.getElementById('e_date').value,
                edu_date: document.getElementById('edu_date').value,
                reason: document.getElementById('reason').value,
                manager: document.getElementById('manager').value
            };

            // 유효성 검사
            if (!data.company) { alert("업체명을 입력해주세요."); return; }
            if (data.birth.length !== 8) { alert("생년월일 8자리를 입력해주세요."); return; }
            if (!data.s_date || !data.e_date || !data.edu_date) { alert("모든 날짜를 선택해주세요."); return; }
            if (data.manager.length < 2) { alert("담당자 성함을 정확히 입력해주세요."); return; }
            if (!data.name || !data.reason) { alert("모든 항목을 입력해주세요."); return; }

            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
