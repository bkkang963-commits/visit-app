<div class="form-group">
            <label>결재 및 참조/수신 라인</label>
            <input type="text" id="app1" placeholder="작성자 이름을 기재하세요 (필수)" style="margin-bottom:5px;">
            <input type="text" id="app2" placeholder="결재자 2 (선택)" style="margin-bottom:5px;">
            <input type="text" id="app3" placeholder="결재자 3 (선택)" style="margin-bottom:15px;">
            
            <input type="text" id="ref1" placeholder="참조 1 (선택)" style="margin-bottom:5px;">
            <input type="text" id="ref2" placeholder="참조 2 (선택)" style="margin-bottom:15px;">
            
            <input type="text" id="recv1" placeholder="수신 1 (선택)" style="margin-bottom:5px;">
            <input type="text" id="recv2" placeholder="수신 2 (선택)">
            <div class="sub-info">※ 결재자 1은 본인 성함을 입력하세요.</div>
        </div>

        <button id="submit_btn">정비오더 신청서 제출</button>
    </div>

    <script>
        // ... (중략: toggleSubOrder 등 기존 함수) ...

        document.getElementById('submit_btn').addEventListener('click', () => {
            // ... (중략: 정비오더유형 병합 및 작업자 필터 로직) ...

            const data = {
                type: "정비오더",
                // ... (기존 필드 동일) ...
                app1: document.getElementById('app1').value.trim(),
                app2: document.getElementById('app2').value.trim(),
                app3: document.getElementById('app3').value.trim(), // 결재자 3 데이터 추가
                ref1: document.getElementById('ref1').value.trim(),
                ref2: document.getElementById('ref2').value.trim(),
                recv1: document.getElementById('recv1').value.trim(),
                recv2: document.getElementById('recv2').value.trim()
            };

            if (!data.order_desc || !data.plan_date1 || !data.app1 || workers.length === 0) {
                alert("내역, 날짜, 작성자, 작업자1은 필수 입력 항목입니다.");
                return;
            }

            tg.sendData(JSON.stringify(data));
        });
    </script>
